#
# Production-grade Logstash pipeline for Serilog (compact JSON) over HTTP
# - Normalizes Serilog compact JSON fields (@t/@l/@m/@x)
# - Adds standard metadata (service/environment/node)
# - Masks common sensitive fields + common PII patterns in message
# - Keeps a controlled structure (no “flatten everything into root”)
# - Provides optional selective promotion of important Serilog properties
# - Drops noisy levels in production
#

input {
  http {
    port => 8080
    host => "0.0.0.0"      # Required to accept traffic from outside the container
    codec => json
  }
}

filter {

  ####################################################################
  # 0) Normalize Serilog compact JSON fields
  #    RenderedCompactJsonFormatter typically emits @t, @l, @m, @x, and Properties.
  ####################################################################
  mutate {
    rename => {
      "@t" => "Timestamp"
      "@l" => "Level"
      "@m" => "message"
      "@x" => "Exception"
      "@i" => "EventId"
      "@mt" => "message_template"
    }
  }

  ####################################################################
  # 1) Standard metadata (environment/node/service)
  #    - service.name is expected either in Serilog Properties (service.name),
  #      or we fallback to an existing field if present.
  ####################################################################
  # Ensure we have a container for labels/metadata
  if ![labels] { mutate { add_field => { "labels" => "{}" } } }

  # Node hostname (useful for k8s/vm/docker)
  mutate {
    add_field => {
      "[labels][node]" => "${HOSTNAME}"
      "[labels][environment]" => "production"
    }
  }

  # If Serilog puts service.name under Properties, copy it to labels.service
  if [Properties][service.name] {
    mutate { add_field => { "[labels][service]" => "%{[Properties][service.name]}" } }
  } else if [service][name] {
    mutate { add_field => { "[labels][service]" => "%{[service][name]}" } }
  } else if [service.name] {
    mutate { add_field => { "[labels][service]" => "%{[service.name]}" } }
  }

  # Normalize labels casing
  mutate { lowercase => [ "[labels][service]", "[labels][environment]" ] }

  ####################################################################
  # 2) Convert Timestamp -> @timestamp
  ####################################################################
  if [Timestamp] {
    date {
      match  => ["Timestamp", "ISO8601"]
      target => "@timestamp"
    }
    mutate { remove_field => ["Timestamp"] }
  }

  ####################################################################
  # 3) Move Serilog Properties under a safe namespace
  #    Instead of flattening everything into root (risk of collisions and mapping pain),
  #    we keep them under [serilog][properties].
  ####################################################################
  if [Properties] {
    mutate {
      rename => { "Properties" => "[serilog][properties]" }
    }
  }

  ####################################################################
  # 4) Selective promotion (safe + useful)
  #    Promote ONLY a few important properties to first-class fields.
  #    This keeps Elasticsearch mappings stable and dashboards easy.
  ####################################################################
  if [serilog][properties][service.environment] {
    mutate { add_field => { "[service][environment]" => "%{[serilog][properties][service.environment]}" } }
  } else {
    mutate { add_field => { "[service][environment]" => "%{[labels][environment]}" } }
  }

  if [serilog][properties][service.version] {
    mutate { add_field => { "[service][version]" => "%{[serilog][properties][service.version]}" } }
  }

  if [serilog][properties][service.name] {
    mutate { add_field => { "[service][name]" => "%{[serilog][properties][service.name]}" } }
  }

  # Common .NET / Serilog structured fields (optional)
  if [serilog][properties][SourceContext] {
    mutate { add_field => { "[log][logger]" => "%{[serilog][properties][SourceContext]}" } }
  }

  ####################################################################
  # 5) Mask sensitive fields (structured fields)
  #    Do this AFTER we moved Properties under [serilog][properties].
  ####################################################################
  # Common direct paths (adjust to your domain objects)
  mutate {
    replace => {
      "[User][Password]" => "[MASKED]"
      "[User][password]" => "[MASKED]"
      "[user][password]" => "[MASKED]"
      "password"         => "[MASKED]"
      "secret"           => "[MASKED]"
      "token"            => "[MASKED]"
      "apiKey"           => "[MASKED]"
      "apikey"           => "[MASKED]"
      "authorization"    => "[MASKED]"
    }
  }

  # Mask common sensitive keys inside Serilog properties (best-effort)
  # Note: Logstash mutate cannot wildcard keys, so we handle common ones.
  if [serilog][properties] {
    mutate {
      replace => {
        "[serilog][properties][password]"      => "[MASKED]"
        "[serilog][properties][secret]"        => "[MASKED]"
        "[serilog][properties][token]"         => "[MASKED]"
        "[serilog][properties][apiKey]"        => "[MASKED]"
        "[serilog][properties][apikey]"        => "[MASKED]"
        "[serilog][properties][Authorization]" => "[MASKED]"
        "[serilog][properties][authorization]" => "[MASKED]"
      }
    }
  }

  ####################################################################
  # 6) Mask PII patterns in message (best-effort)
  ####################################################################
  if [message] {
    mutate {
      # Email
      gsub => [
        "message", "(?i)[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}", "[EMAIL_MASKED]"
      ]
    }

    mutate {
      # Phone (generic)
      gsub => [
        "message", "(\\+?\\d{1,3})?[-.\\s]?\\d{3}[-.\\s]?\\d{3,4}[-.\\s]?\\d{4}", "[PHONE_MASKED]"
      ]
    }

    mutate {
      # Card numbers (13-16 digits, loose)
      gsub => [
        "message", "\\b(?:\\d[ -]*?){13,16}\\b", "[CARD_MASKED]"
      ]
    }

    mutate {
      # IBAN (basic)
      gsub => [
        "message", "\\b[A-Z]{2}[0-9]{2}[A-Z0-9]{11,30}\\b", "[IBAN_MASKED]"
      ]
    }
  }

  ####################################################################
  # 7) Parse exceptions (Serilog Exception field)
  #    Keep full exception as text, and try to split into message + stacktrace.
  ####################################################################
  if [Exception] {
    mutate { rename => { "Exception" => "[error][stack_trace]" } }

    # Best-effort: first line is usually the exception message
    grok {
      match => {
        "[error][stack_trace]" => [
          "(?m)^(?< [error][message] >.*?)(\r?\n%{GREEDYDATA:[error][stack_trace]})?$"
        ]
      }
      tag_on_failure => []
    }
  }

  ####################################################################
  # 8) Drop noisy logs in production (Debug/Verbose/Trace)
  ####################################################################
  if [Level] =~ /(?i)debug|verbose|trace/ {
    drop { }
  }

  ####################################################################
  # 9) Cleanup (remove useless/duplicative fields)
  ####################################################################
  mutate {
    remove_field => [
      "Headers",
      "host",
      "@version",
      "[serilog][properties][RequestPath]"
    ]
  }

  # If you want to remove SourceContext to reduce clutter, keep it promoted only:
  mutate {
    remove_field => [
      "[serilog][properties][SourceContext]"
    ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"] # Uses the Docker service name
    index => "basket-service-logs-%{+YYYY.MM.dd}"
  }
  
  # This is your "Debug Mode" - it prints every log Logstash receives to the Docker console
  stdout { 
    codec => rubydebug 
  }
}
